version: '3.8'

services:
  app:
    # 개발용 Dockerfile을 기본으로 사용합니다.
    # 프로덕션 빌드를 원하면 docker-compose.prod.yml 파일을 따로 만들거나,
    # docker build -f Dockerfile.prod ... 명령어를 직접 사용하세요.
    build:
      context: .
      dockerfile: Dockerfile.dev # 개발 시 사용할 Dockerfile 지정
    ports:
      - "8080:8080" # 애플리케이션 포트 매핑
      - "5005:5005" # 디버깅 포트 매핑 (Dockerfile.dev 사용 시)
    volumes:
      # 개발 중 실시간 변경을 위해 로컬 소스 코드를 컨테이너에 마운트
      - .:/app
      # Gradle 캐시를 위한 볼륨 마운트 (선택 사항이지만 빌드 속도 향상에 권장)
      - gradle_cache:/root/.gradle
    environment:
      # 데이터베이스 연결 정보 (Oracle 설정에 맞게 조정하세요)
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle:1521/XE
      SPRING_DATASOURCE_USERNAME: your_oracle_user # 실제 Oracle 사용자 이름으로 변경
      SPRING_DATASOURCE_PASSWORD: your_oracle_password # 실제 Oracle 비밀번호로 변경
      SPRING_JPA_HIBERNATE_DDL_AUTO: update # 개발 환경에서는 'update' 또는 'create-drop' 고려
      # Azure 자격 증명 (실제 값으로 변경하거나 프로덕션에서는 Managed Identity 사용)
      # 로컬 개발 시에는 Azure CLI 로그인 또는 서비스 주체를 사용할 수 있습니다.
      # 이 값들은 .env 파일에 저장하고 docker-compose.yml에서 참조하는 것이 좋습니다.
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_SUBSCRIPTION_ID: ${AZURE_SUBSCRIPTION_ID}
      AZURE_KEYVAULT_ENDPOINT: ${AZURE_KEYVAULT_ENDPOINT}
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY} # 또는 Managed Identity 사용
    depends_on:
      - oracle # Oracle 서비스가 앱보다 먼저 시작되도록 설정

  oracle:
    image: container-registry.oracle.com/database/express:21.3.0-xe # Oracle Database 21c Express Edition 이미지
    ports:
      - "1521:1521" # Oracle의 기본 포트 매핑
    environment:
      ORACLE_PWD: your_oracle_password # Oracle 비밀번호 설정 (강력한 비밀번호 사용)
    volumes:
      - oracle_data:/opt/oracle/oradata # Oracle 데이터 영속성을 위한 볼륨 마운트

  redis: # 선택 사항: 캐싱을 위해 Redis를 사용할 계획이라면 추가하세요.
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data # Redis 데이터 영속성을 위한 볼륨 마운트

volumes:
  oracle_data: # Oracle 데이터 볼륨 정의
  redis_data: # Redis 데이터 볼륨 정의
  gradle_cache: # Gradle 캐시 볼륨 정의
